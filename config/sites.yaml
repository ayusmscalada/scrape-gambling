# Site configuration for automation workers
# Each site can be enabled/disabled and configured independently
# 
# Note: For local development, headless: false shows visible browser windows
# In Docker without GUI forwarding, visible windows won't appear

sites:
  shuffle:
    key: shuffle
    name: Shuffle
    url: https://shuffle.com
    enabled: true
    headless: false
    channel: chromium
    profile_dir: ./profiles/shuffle
    viewport_width: 1440
    viewport_height: 900
    slow_mo: null
    launch_on_start: false
    max_retries: 3
    timeout_seconds: 30

